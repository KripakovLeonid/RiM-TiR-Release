suite:
  name: rim-tir-suite
  version: 0.1.0-dev

target:
  os: linux
  arch: armhf
  deb_arch: armhf
  id: linux-armhf

components:
  frontend:
    product: rim-tir-frontend
    repo: ""
    source:
      type: local
      path: artifacts/frontend-dist.zip

  backend:
    product: rim-tir-backend
    repo: ""
    source:
      type: local
      path: artifacts/backend-linux-armhf.tar.gz

packages:
  enabled:
    - client

  client:
    name: rim-tir-client
    description: RiM-TiR client package with backend API and web UI
    maintainer: 
