stages:
  - validate
  - build

variables:
  MANIFEST_PATH: "manifests/product-linux-amd64.yaml"
  PRODUCT_MANIFESTS: "manifests/product-linux-amd64.yaml manifests/product-linux-arm64.yaml manifests/product-windows-amd64.yaml"
  RELEASE_CI_IMAGE: "python:3.12-slim"

default:
  image: "$RELEASE_CI_IMAGE"
  before_script:
    - python --version
    - pip install -r packaging/requirements.txt

validate:
  stage: validate
  script:
    - ./ci/validate.sh

build:product:
  stage: build
  needs:
    - validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
  parallel:
    matrix:
      - TARGET_ID: "linux-amd64"
        MANIFEST_PATH: "manifests/product-linux-amd64.yaml"
      - TARGET_ID: "linux-arm64"
        MANIFEST_PATH: "manifests/product-linux-arm64.yaml"
      - TARGET_ID: "windows-amd64"
        MANIFEST_PATH: "manifests/product-windows-amd64.yaml"
  script:
    - ./ci/build-release.sh
  artifacts:
    name: "rim-tir-suite-${TARGET_ID}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    expire_in: 30 days
    paths:
      - dist/*/*.zip
      - dist/*/*.tar.gz
      - dist/*/manifest.json
      - dist/*/checksums.sha256
