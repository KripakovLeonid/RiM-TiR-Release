name: Build Release Bundle

on:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish GitHub release
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      DEV_MANIFESTS: "manifests/suite-dev.yaml manifests/suite-dev-linux-arm64.yaml manifests/suite-dev-linux-armhf.yaml manifests/suite-dev-windows-amd64.yaml"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: docker build -f ci/Dockerfile -t rim-tir-release-ci:local .

      - name: Validate repository
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e DEV_MANIFESTS="$DEV_MANIFESTS" \
            -v "$PWD:/workspace" \
            rim-tir-release-ci:local \
            ./ci/validate.sh

  build:
    needs:
      - validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            manifest: manifests/suite-dev.yaml
          - target: linux-arm64
            manifest: manifests/suite-dev-linux-arm64.yaml
          - target: linux-armhf
            manifest: manifests/suite-dev-linux-armhf.yaml
          - target: windows-amd64
            manifest: manifests/suite-dev-windows-amd64.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: docker build -f ci/Dockerfile -t rim-tir-release-ci:local .

      - name: Build suite
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e MANIFEST_PATH="${{ matrix.manifest }}" \
            -e TARGET_ID="${{ matrix.target }}" \
            -e CREATE_DUMMY_ARTIFACTS="true" \
            -v "$PWD:/workspace" \
            rim-tir-release-ci:local \
            ./ci/build-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rim-tir-suite-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  publish:
    needs:
      - build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rim-tir-suite-*
          path: release-dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: suite-${{ github.run_number }}
          name: RiM-TiR Suite ${{ github.run_number }}
          files: release-dist/*
